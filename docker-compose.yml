services:
  db:
    image: postgres:16
    container_name: igw_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inglewood
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inglewood || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    # Expose DB to host ONLY in dev
    #profiles: ["dev"]
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: igw_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: America/Los_Angeles
      PG_DSN: ${PG_DSN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      API_KEY: ${API_KEY}
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log"]
    expose:
      - "8000"
    # Publish API port only in dev; in prod it sits behind the proxy
    #profiles: ["dev"]
    ports:
      - "8000:8000"
    # Harden in prod
    read_only: true
    tmpfs: ["/tmp"]

  scheduler:
    build: .
    container_name: igw_scheduler
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: America/Los_Angeles
      PG_DSN: ${PG_DSN}
    volumes:
      - ./:/app:ro
    command: >
      bash -lc "python -u ingest_pg.py >> /var/log/ingest.log 2>&1 || true;
      exec supercronic /app/docker/crontab"

  # Frontend service (production only)
  frontend:
    build:
      context: ./ing-frontend
      dockerfile: Dockerfile
    container_name: igw_frontend
    profiles: ["prod"]
    expose:
      - "80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  # Public reverse proxy only in prod
  proxy:
    image: caddy:2
    container_name: igw_proxy
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    profiles: ["prod"]

volumes:
  pgdata:
  caddy_data:
  caddy_config: