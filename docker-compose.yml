version: "3.9"

services:
  db:
    image: postgres:16
    container_name: igw_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      ING_USER_PASSWORD: ${ING_USER_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingest:
    build: .
    container_name: igw_ingest
    depends_on:
      - db
    environment:
      PG_DSN: postgresql://ing_user:${ING_USER_PASSWORD}@db:5432/inglewood
      TZ: America/Los_Angeles
    entrypoint: ["python", "ingest_pg.py"]
    volumes:
      - ./:/app:ro

  scheduler:
    build: .
    container_name: igw_scheduler
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_DSN: postgresql://ing_user:${ING_USER_PASSWORD}@db:5432/inglewood
      TZ: America/Los_Angeles
    volumes:
      - ./:/app:ro
    # Runs ingest once at startup, then every day at 04:00 LA
    command: >
      bash -lc "python -u ingest_pg.py >> /var/log/ingest.log 2>&1 || true;
      exec supercronic /app/docker/crontab"
    restart: unless-stopped

  api:
    build: .
    container_name: igw_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_DSN: postgresql://ing_user:${ING_USER_PASSWORD}@db:5432/inglewood
      TZ: America/Los_Angeles
      # comma-separated list of allowed web origins
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8080"
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log"]
    expose:
      - "8000"
    # For local dev, expose a port. In prod, put Nginx/Caddy in front.
    ports:
      - "8000:8000"

volumes:
  pgdata:
